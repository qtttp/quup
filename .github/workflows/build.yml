name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Deps
        run: sudo apt-get update && sudo apt-get install -y git zip unzip openjdk-17-jdk libffi-dev libssl-dev build-essential ccache autoconf libtool pkg-config
      - name: Pip
        run: pip install buildozer==1.5.0 cython==0.29.33
      - name: Spec
        run: |
          buildozer init
          sed -i 's/^title = .*/title = quup/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = quup/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = org.qtttp/' buildozer.spec
          sed -i 's/^source.dir = .*/source.dir = src/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec
      - name: Build
        run: buildozer -v android debug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: quup-debug
          path: bin/*.apk
