name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev \
            build-essential ccache \
            autoconf libtool pkg-config

      - name: Install buildozer
        run: |
          pip install buildozer cython

      - name: Create buildozer.spec
        run: |
          cd $GITHUB_WORKSPACE
          buildozer init
          sed -i 's/^title = .*/title = quup/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = quup/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = org.qtttp/' buildozer.spec
          sed -i 's/^source.dir = .*/source.dir = src/' buildozer.spec
          sed -i 's/^source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/^android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          buildozer android debug 2>&1 | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: quup-debug.apk
          path: bin/*.apk
