name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev \
            build-essential ccache \
            autoconf libtool pkg-config \
            lld

      - name: Install buildozer
        run: pip install buildozer==1.5.0 cython==0.29.33

      - name: Init buildozer
        run: buildozer init

      - name: Configure spec
        run: |
          sed -i 's/^title = .*/title = quup/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = quup/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = org.qtttp/' buildozer.spec
          sed -i 's/^source.dir = .*/source.dir = src/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/^#android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/^#android.minapi = .*/android.minapi = 21/' buildozer.spec

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quup-debug
          path: bin/*.apk
